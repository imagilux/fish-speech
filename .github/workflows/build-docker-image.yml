name: Build Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - backend: rocm
            uv_extra: rocm72
            platforms: linux/amd64
          - backend: cpu
            uv_extra: cpu
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            version=$(basename ${GITHUB_REF})
          else
            version=nightly
          fi
          echo "version=${version}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push server-${{ matrix.backend }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          target: server
          build-args: |
            BACKEND=${{ matrix.backend }}
            UV_EXTRA=${{ matrix.uv_extra }}
          tags: |
            ghcr.io/${{ github.repository }}:server-${{ matrix.backend }}-${{ env.version }}
            ghcr.io/${{ github.repository }}:server-${{ matrix.backend }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:server-${{ matrix.backend }}
          cache-to: type=inline

  build-webui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            version=$(basename ${GITHUB_REF})
          else
            version=nightly
          fi
          echo "version=${version}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push webui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.webui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:webui-${{ env.version }}
            ghcr.io/${{ github.repository }}:webui
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:webui
          cache-to: type=inline
